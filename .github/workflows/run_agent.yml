name: 🤖 Job Agent Automation

on:
  # Run daily at 9 AM IST (3:30 AM UTC)
  schedule:
    - cron: '30 3 * * 1-5'   # Mon-Fri only

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run? (no emails sent)'
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']

env:
  PYTHON_VERSION: "3.11"

jobs:
  run-agent:
    name: 🚀 Run Job Agent
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env from secrets
        run: |
          cat > .env << EOF
          GMAIL_ADDRESS=${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}
          OLLAMA_HOST=${{ secrets.OLLAMA_HOST }}
          OLLAMA_MODEL=llama3
          JOB_TITLES=${{ secrets.JOB_TITLES }}
          JOB_LOCATIONS=${{ secrets.JOB_LOCATIONS }}
          DRY_RUN=${{ github.event.inputs.dry_run || 'false' }}
          MAX_EMAILS_PER_DAY=10
          EOF

      - name: Run job agent
        run: python main.py

      - name: Upload application logs
        uses: actions/upload-artifact@v4
        with:
          name: application-logs-${{ github.run_id }}
          path: |
            data/applications/applications.json
            data/logs/
          retention-days: 30

      - name: Upload tailored resumes
        uses: actions/upload-artifact@v4
        with:
          name: tailored-resumes-${{ github.run_id }}
          path: data/resumes/tailored/
          retention-days: 7

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Job Agent Failed — ${new Date().toDateString()}`,
              body: `The scheduled job agent run failed. Check workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['bug', 'automated']
            })
